<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="banto v5 architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="800" height="520" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#58a6ff" text-anchor="middle" letter-spacing="0.15em">BANTO v5 ARCHITECTURE</text>

  <!-- ── Layer 1: Human + AI Agent ── -->
  <rect x="20" y="48" width="370" height="68" rx="10" fill="rgba(63,185,80,0.1)" stroke="#3fb950" stroke-width="1"/>
  <text x="40" y="72" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#3fb950">Human</text>
  <text x="40" y="90" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Browser popup / Terminal</text>
  <text x="40" y="104" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Provides secret values</text>

  <rect x="410" y="48" width="370" height="68" rx="10" fill="rgba(88,166,255,0.1)" stroke="#58a6ff" stroke-width="1"/>
  <text x="430" y="72" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#58a6ff">AI Agent (Claude / ChatGPT)</text>
  <text x="430" y="90" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">MCP tools / CLI --json</text>
  <text x="430" y="104" font-family="system-ui,sans-serif" font-size="10" fill="#f85149">Never sees secret values</text>

  <!-- Arrow -->
  <text x="400" y="134" font-family="system-ui,sans-serif" font-size="11" fill="#30363d" text-anchor="middle">▼ register_key (browser)          ▼ sync_setup / push / validate</text>

  <!-- ── Layer 2: banto Core ── -->
  <rect x="20" y="148" width="760" height="130" rx="12" fill="rgba(210,153,34,0.08)" stroke="#d29922" stroke-width="1.5"/>
  <text x="40" y="174" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#d29922">banto</text>

  <!-- MCP Server -->
  <rect x="40" y="186" width="160" height="44" rx="8" fill="#21262d" stroke="#30363d"/>
  <text x="120" y="206" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#e6edf3" text-anchor="middle">MCP Server</text>
  <text x="120" y="220" font-family="system-ui,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">10 tools / stdio+http+sse</text>

  <!-- Sync Engine -->
  <rect x="215" y="186" width="160" height="44" rx="8" fill="#21262d" stroke="#30363d"/>
  <text x="295" y="206" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#e6edf3" text-anchor="middle">Sync Engine</text>
  <text x="295" y="220" font-family="system-ui,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">33 drivers / setup / audit</text>

  <!-- Budget (optional) -->
  <rect x="390" y="186" width="160" height="44" rx="8" fill="#21262d" stroke="#30363d" stroke-dasharray="4,2"/>
  <text x="470" y="206" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#e6edf3" text-anchor="middle">Budget (opt-in)</text>
  <text x="470" y="220" font-family="system-ui,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Hold / Settle / 3-layer</text>

  <!-- Lease (optional) -->
  <rect x="565" y="186" width="160" height="44" rx="8" fill="#21262d" stroke="#30363d" stroke-dasharray="4,2"/>
  <text x="645" y="206" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#e6edf3" text-anchor="middle">Lease (opt-in)</text>
  <text x="645" y="220" font-family="system-ui,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">TTL / auto-revoke</text>

  <!-- Validate + Web UI -->
  <rect x="40" y="240" width="160" height="30" rx="6" fill="#21262d" stroke="#30363d"/>
  <text x="120" y="260" font-family="system-ui,sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">Validate (6 providers)</text>

  <rect x="215" y="240" width="160" height="30" rx="6" fill="#21262d" stroke="#30363d"/>
  <text x="295" y="260" font-family="system-ui,sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">Web UI (CSRF)</text>

  <rect x="390" y="240" width="160" height="30" rx="6" fill="#21262d" stroke="#30363d"/>
  <text x="470" y="260" font-family="system-ui,sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">Notifications (4)</text>

  <rect x="565" y="240" width="160" height="30" rx="6" fill="#21262d" stroke="#30363d"/>
  <text x="645" y="260" font-family="system-ui,sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">Fingerprint Drift</text>

  <!-- Arrow -->
  <text x="400" y="298" font-family="system-ui,sans-serif" font-size="11" fill="#30363d" text-anchor="middle">▼ ctypes (no argv)                                    ▼ stdin / tempfile</text>

  <!-- ── Layer 3: Keychain ── -->
  <rect x="20" y="310" width="370" height="64" rx="10" fill="rgba(63,185,80,0.08)" stroke="#3fb950" stroke-width="1"/>
  <text x="40" y="336" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#3fb950">macOS Keychain</text>
  <text x="40" y="354" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Secure Enclave / Security.framework via ctypes</text>
  <text x="40" y="366" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Values never in argv, tempfile, or shell expansion</text>

  <!-- ── Layer 3b: Cloud Targets ── -->
  <rect x="410" y="310" width="370" height="64" rx="10" fill="rgba(88,166,255,0.08)" stroke="#58a6ff" stroke-width="1"/>
  <text x="430" y="336" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#58a6ff">33 Cloud Platforms</text>
  <text x="430" y="354" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Vercel / Cloudflare / AWS / GCP / Azure / K8s ...</text>
  <text x="430" y="366" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Secrets synced via stdin pipe / tempfile (0600)</text>

  <!-- ── Layer 4: LLM Providers ── -->
  <text x="400" y="396" font-family="system-ui,sans-serif" font-size="11" fill="#30363d" text-anchor="middle">▼ API calls with keys from Keychain</text>
  <rect x="120" y="406" width="560" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="#30363d"/>
  <text x="400" y="430" font-family="system-ui,sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">OpenAI  ·  Anthropic  ·  Google Gemini  ·  xAI  ·  GitHub  ·  Cloudflare</text>

  <!-- ── Legend ── -->
  <rect x="20" y="460" width="760" height="48" rx="8" fill="rgba(255,255,255,0.02)"/>
  <rect x="40" y="476" width="12" height="12" rx="2" fill="rgba(63,185,80,0.3)" stroke="#3fb950"/>
  <text x="58" y="487" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Secret values (Keychain only)</text>
  <rect x="220" y="476" width="12" height="12" rx="2" fill="rgba(88,166,255,0.3)" stroke="#58a6ff"/>
  <text x="238" y="487" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Metadata only (agent-safe)</text>
  <rect x="420" y="476" width="12" height="12" rx="2" fill="#21262d" stroke="#30363d" stroke-dasharray="4,2"/>
  <text x="438" y="487" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Optional module</text>
  <rect x="600" y="476" width="12" height="12" rx="2" fill="rgba(210,153,34,0.2)" stroke="#d29922"/>
  <text x="618" y="487" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">banto core</text>
</svg>
